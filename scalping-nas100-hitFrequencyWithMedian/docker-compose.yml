services:
  init-hfmed-schema: # One-shot init job; creates only the result tables from ./init/schema.sql.
    image: postgres:17-alpine # Provides psql for schema initialization.
    restart: "no" # Do not restart this one-shot job.
    volumes:
      - ./init/schema.sql:/init.sql:ro # Mount schema SQL read-only into the init container.
    environment:
      # Init database connection.
      PGPASSWORD: postgres-ts-root-pw # Password for the postgres-ts init connection.
      # Schema lifecycle.
      DROP_ALL_HFMED_TABLES_ON_START: "false" # Keep existing hfmed result tables (preserve walk-forward runs 1-7 as comparison baseline).
    command: # Run schema.sql against the TimescaleDB/PostgreSQL service.
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -v drop_hfmed_tables_on_start="$${DROP_ALL_HFMED_TABLES_ON_START:-false}"
        -h timescaledb -p 5432 -U postgres-ts -d postgres -f /init.sql
    networks:
      - shared_net # Shared Docker network used to reach timescaledb.

  nas100-hfmed-backtest-runner:
    build:
      context: . # Build from this stack directory.
      dockerfile: Dockerfile # Python runner image definition.
    restart: "no" # Do not restart after the backtest job exits.
    mem_limit: 12g # Keep the optimizer from exhausting the trading VM memory.
    memswap_limit: 12g # Do not let the container exceed its RAM budget via swap.
    cpus: "6.0" # Keep host CPU scheduling predictable while multiprocessing is active.
    depends_on:
      init-hfmed-schema:
        condition: service_completed_successfully # Start runner only after schema init succeeded.
    environment:
      # Database connection and schema.
      - PGHOST=timescaledb # PostgreSQL host in shared_net.
      - PGPORT=5432 # PostgreSQL port.
      - PGDATABASE=postgres # Target database.
      - PGUSER=market-data-account # Runner database user.
      - PGPASSWORD=market-data-account-pw # Runner database password.
      - PGAPPNAME=nas100_hfmed_backtest_runner # Application name sent to PostgreSQL.
      - PGOPTIONS=-c search_path=public # Set the database search_path.
      - RESULT_SCHEMA=public # Schema for hfmed result tables.

      # Database timeouts and retries.
      - DB_CONNECT_TIMEOUT_SECONDS=10 # Timeout for one DB connection attempt.
      - DB_CONNECT_RETRIES=5 # Number of DB connection attempts.
      - DB_CONNECT_RETRY_DELAY_SECONDS=5.0 # Base delay between DB retries; code backs off exponentially.
      - DB_STATEMENT_TIMEOUT_MS=120000 # Max runtime per SQL statement.
      - DB_LOCK_TIMEOUT_MS=5000 # Max wait time for DB locks.
      - DB_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS=120000 # Timeout for idle DB transactions.

      # Logging and run metadata.
      - LOG_LEVEL=INFO # Python logging level.
      - RUN_LABEL_TZ=Europe/Berlin # Timezone used for run labels.
      - RUN_NOTES_EXTRA=phase2-validate-consensus-global-set # Optional extra run note.

      # Run mode and parameter source.
      - RUN_MODE=single # Runner mode; single or walk_forward. Phase 2 validation: static consensus global set over full period.
      - SINGLE_PARAMETER_PATH=single_parameter.ini # Per-session manual parameter file used by RUN_MODE=single.
      - PARAMETER_GRID_PATH=parameter_grid.ini # Parameter grid file for optimizer candidates.

      # Single-modeasdf trade_history export.
      - TRADE_HISTORY_PERSIST_ENABLED=true # If true, RUN_MODE=single additionally upserts trades into trade_history.
      - TRADE_HISTORY_ACCOUNT_NUMBER=000006 # trade_history account_number used when RUN_MODE=single.
      - TRADE_HISTORY_ACCOUNT_TYPE=backtesting # trade_history account_type used when RUN_MODE=single.

      # Market data source and date range.
      - SOURCE_TABLE=public.pepperstone_ticks_data # Tick source table with tick_time, bid and ask.
      - SYMBOL=NAS100 # Symbol filter for source ticks.
      - START_TS_UTC=2025-01-01T00:00:00Z # Inclusive UTC start; leave empty to use earliest tick.
      - END_TS_UTC= # Exclusive UTC end; leave empty to use latest tick.

      # Bar and profile construction.
      - BAR_SECONDS=60 # Mid-price bar duration built from ticks.
      - MIN_LOOKBACK_BARS=30 # Minimum completed bars before profile signals are valid; per-session/candidate LOOKBACK_BARS lives in the parameter files.
      - PROFILE_MAX_LOOKBACK_SECONDS= # Optional wall-clock cap; empty means per-session/candidate LOOKBACK_BARS * BAR_SECONDS.
      - PRICE_STEP=1.0 # Price level grid size for the hit-frequency profile.

      # Entry sessions.
      - SESSION_TIMEZONE=America/New_York # Timezone used to interpret entry sessions.
      - SESSION_ASIA_EARLY_ENABLED=true # Enable new entries from 20:00-00:00.
      - SESSION_ASIA_LATE_ENABLED=true # Enable new entries from 00:00-03:00.
      - SESSION_LONDON_OPEN_ENABLED=true # Enable new entries from 03:00-04:00.
      - SESSION_PRE_MARKET_EARLY_ENABLED=true # Enable new entries from 04:00-07:00.
      - SESSION_PRE_MARKET_ACTIVE_ENABLED=true # Enable new entries from 07:00-08:30.
      - SESSION_PRE_MARKET_MACRO_ENABLED=true # Enable new entries from 08:30-09:30.
      - SESSION_NY_OPEN_IMPULSE_ENABLED=true # Enable new entries from 09:30-10:00.
      - SESSION_NY_MORNING_ENABLED=true # Enable new entries from 10:00-11:30.
      - SESSION_NY_MIDDAY_ENABLED=true # Enable new entries from 11:30-14:00.
      - SESSION_NY_LATE_ENABLED=true # Enable new entries from 14:00-15:00.
      - SESSION_NY_POWER_HOUR_ENABLED=true # Enable new entries from 15:00-16:00.
      - SESSION_AFTER_CLOSE_SHOCK_ENABLED=true # Enable new entries from 16:00-17:00.
      - SESSION_AFTER_HOURS_LATE_ENABLED=true # Enable new entries from 17:00-20:00.

      # Strategy mode.
      - STOP_MODE=band # Stop mode; concrete TP/stop/range values live in single_parameter.ini or parameter_grid.ini.

      # Account, sizing and risk.
      - ACCOUNT_PROFILE=PS_ACC # Pepperstone-style CFD account profile label.
      - INITIAL_EQUITY=5000 # Starting account equity.
      - ACCOUNT_CURRENCY=EUR # Account currency used for persisted metrics.
      - MARGIN_REQUIREMENT_PCT=5 # Margin requirement percentage.
      - RISK_PER_TRADE_PCT=1 # Equity risk budget per trade.
      - MAX_MARGIN_PCT=100 # Maximum equity share allowed as position margin.
      - CONTRACT_MULTIPLIER=1.0 # PnL multiplier per unit and point.
      - LOT_SIZE=0.1 # Position units are rounded down to this lot size.
      - EURUSD_RATE=1.0 # USD-to-EUR conversion rate; USD values are divided by this rate.

      # Execution costs.
      - SPREAD_POINTS=0.0 # Extra spread cost; live bid/ask ticks already include spread.
      - SLIPPAGE_POINTS=0.0 # Extra round-trip slippage cost in points.
      - COMMISSION_PER_UNIT=0.0 # Commission per unit per entry and exit.

      # Monte-Carlo simulation settings.
      - MONTE_CARLO_ENABLED=true # Enable Monte-Carlo risk scoring.
      - MONTE_CARLO_SIMULATIONS=2000 # Number of Monte-Carlo simulations.
      - MC_EXTRA_SLIPPAGE_POINTS=0.5 # Extra slippage applied in the MC slippage scenario.
      - MC_BLOCK_SIZE=5 # Block size for sequence-risk bootstrap.
      - MC_RUIN_DRAWDOWN_PCT=50.0 # Ruin threshold as drawdown from initial equity.
      - MC_RANDOM_SEED=12345 # Seed for reproducible Monte-Carlo results.

      # Walk-forward windows.
      - WF_MATRIX_ENABLED=true # Run several walk-forward window combinations in one container run.
      - WF_TRADING_DAY_TIMEZONE=America/New_York # Timezone used to count observed trading days.
      - WF_MATRIX_TRAIN_TRADING_DAYS=20,40,60  # Train window lengths in observed trading days.
      - WF_MATRIX_TEST_TRADING_DAYS=10,20 # OOS window lengths in observed trading days; step_trading_days equals test_trading_days.

      # Walk-forward finalist candidate validation.
      - WF_FINALIST_ENABLED=true # Validate a fixed finalist candidate set OOS in every fold (consistent full coverage).
      - WF_FINALIST_TOP_N_PER_SESSION=2000 # Per-session train top-N collected into the finalist union.
      - WF_FINALIST_GLOBAL_TOP_N=5000 # Additional global train top-N collected into the finalist union; 0 disables.
      - WF_FINALIST_MAX_SETS=10000 # Hard cap on the finalist set (kept by best cumulative train score); 0 means unlimited.
      - WF_FINALIST_KEEP_TRADES=false # Persist only summary metrics for finalist OOS evaluations.
      - WF_FINALIST_PERSIST_FOLD_RESULTS=true # Write finalist OOS per-fold results to DB.
      - WF_GLOBAL_PARAMETER_SET=true # Phase 2: portfolio uses ONE global set (fold train best) across all enabled sessions instead of per-session selection.

      # Session parameter selection.
      - SESSION_SELECTOR_MIN_TRADES_FLOOR=30 # Floor for minimum train trades expected per session-specific parameter winner.
      - SESSION_SELECTOR_MIN_TRADES_PER_TRAIN_TRADING_DAY=1.0 # Scales minimum train trades by WF train_trading_days; effective minimum is max(floor, ceil(train_trading_days * value)).
      - SESSION_SELECTOR_LCB_Z=1 # Lower-confidence penalty: net P&L minus z * trade P&L std * sqrt(trades).
      - SESSION_SELECTOR_TOP_N=1000 # Candidate pool per session used for robust plateau selection.
      - SESSION_SELECTOR_PLATEAU_WEIGHT=0.20 # Blend candidate score with nearby-parameter median score.
      - SESSION_SELECTOR_NEIGHBOR_DISTANCE=1.25 # Normalized parameter distance used to identify nearby candidates.
      - SESSION_SELECTOR_PREVIOUS_KEEP_SCORE_TOLERANCE=2.0 # Keep prior fold's session parameter if still this close to the best score.

      # Optimizer execution.
      - OPTIMIZER_PROCESSES=6 # Number of worker processes for candidate evaluation.
      - OPTIMIZER_PROCESS_CHUNK_SIZE=64 # Number of profile-groups handed to each worker per pool chunk.
      - OPTIMIZER_PROFILE_CACHE_SIZE=1 # Rolling profile cache size per worker window.
      - OPTIMIZER_PROGRESS_LOG_EVERY=5000 # Log optimizer progress after this many completed candidates.
      - OPTIMIZER_PROGRESS_LOG_SECONDS=60 # Log optimizer progress after this many seconds.
      - OPTIMIZER_SAMPLING_SEED=12345 # Seed for reproducible Stage 1/2 candidate sampling.

      # Stage 1 coarse search.
      - STAGE1_MAX_PARAMETER_SETS=131072 # Max coarse-grid Stage 1 candidates; 0 means unlimited.

      # Stage 2 local refinement.
      - STAGE2_ENABLED=true # Enable local midpoint refinement around best Stage 1 candidates.
      - STAGE2_SEED_TOP_N=30 # Number of Stage 1 seeds for Stage 2 refinement.
      - STAGE2_MAX_PARAMETER_SETS=1500 # Max Stage 2 candidates; 0 means unlimited.

      # Final scoring, filtering and persistence.
      - MC_SCORE_TOP_N=1000 # Number of top parameter sets scored with Monte-Carlo.
      - PERSIST_TOP_TRADES_N=1000 # Persist individual trades only for top N parameter sets.
      - MIN_OOS_TRADES=40 # Minimum out-of-sample trades for filters and scoring.
      - MIN_OOS_PROFIT_FACTOR=1.1 # Minimum OOS profit factor filter.
      - MAX_OOS_DRAWDOWN_PCT=25.0 # Maximum allowed OOS drawdown percentage.
      - MAX_MC_RUIN_PCT=5.0 # Maximum allowed Monte-Carlo ruin probability.
    networks:
      - shared_net # Shared Docker network used to reach timescaledb.

networks:
  shared_net:
    external: true # Use an existing shared_net network.
