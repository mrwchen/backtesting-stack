services:
  # One-shot init job. Creates only the result tables from ./init/schema.sql.
  init-hfmed-schema:
    image: postgres:17-alpine
    restart: "no"
    volumes:
      - ./init/schema.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres-ts-root-pw
      DROP_ALL_HFMED_TABLES_ON_START: "true"
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -v drop_hfmed_tables_on_start="$${DROP_ALL_HFMED_TABLES_ON_START:-false}"
        -h timescaledb -p 5432 -U postgres-ts -d postgres -f /init.sql
    networks:
      - shared_net

  nas100-hfmed-backtest-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      init-hfmed-schema:
        condition: service_completed_successfully
    environment:
      # Database.
      - PGHOST=timescaledb
      - PGPORT=5432
      - PGDATABASE=postgres
      - PGUSER=market-data-account
      - PGPASSWORD=market-data-account-pw
      - PGAPPNAME=nas100_hfmed_backtest_runner
      - PGOPTIONS=-c search_path=public
      - RESULT_SCHEMA=public
      - DB_CONNECT_TIMEOUT_SECONDS=10
      - DB_CONNECT_RETRIES=5
      - DB_CONNECT_RETRY_DELAY_SECONDS=5.0
      - DB_STATEMENT_TIMEOUT_MS=120000
      - DB_LOCK_TIMEOUT_MS=5000
      - DB_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS=120000
      - LOG_LEVEL=INFO
      - RUN_LABEL_TZ=Europe/Berlin
      - RUN_NOTES_EXTRA=
      - RUN_MODE=walk_forward

      # Tick data source. Leave START_TS_UTC empty to use all available ticks.
      - SOURCE_TABLE=public.pepperstone_ticks_data
      - SYMBOL=NAS100
      - START_TS_UTC=2026-01-15T00:00:00Z
      - END_TS_UTC=

      # Baseline values for single mode and non-optimized settings.
      - BAR_SECONDS=10
      - LOOKBACK_BARS=90
      - MIN_LOOKBACK_BARS=90
      - PRICE_STEP=1.0

      # Trade rule: tick-level median crossing.
      - LONG_CROSS_QUANTILE=0.50
      - SHORT_CROSS_QUANTILE=0.50

      # Entry session switches. Times are interpreted in SESSION_TIMEZONE.
      # Disabled sessions suppress new entries only; open trades still exit tick-by-tick.
      - SESSION_TIMEZONE=America/New_York
      - SESSION_PRE_MARKET_ENABLED=false       # 04:00-09:30
      - SESSION_NY_OPEN_POWER_ENABLED=true    # 09:30-11:30
      - SESSION_NY_MIDDAY_ENABLED=true        # 11:30-14:00
      - SESSION_NY_LATE_ENABLED=false          # 14:00-15:00
      - SESSION_NY_POWER_HOUR_ENABLED=false    # 15:00-16:00
      - SESSION_AFTER_HOURS_ENABLED=false      # 16:00-20:00
      - SESSION_OVERNIGHT_ENABLED=true        # 20:00-04:00

      # General trade parameters.
      - STOP_MODE=band
      - TAKE_PROFIT_POINTS=10.0

      # Only used when STOP_MODE=fixed.
      - STOP_POINTS=10.0

      # Only used when STOP_MODE=band.
      - MIN_PROFILE_RANGE_POINTS=60.0
      - STOP_PROFILE_LOWER_QUANTILE=0.0
      - STOP_PROFILE_UPPER_QUANTILE=1.0
      - STOP_PROFILE_BUFFER_POINTS=1
      - MIN_STOP_DISTANCE_POINTS=12.0
      - MAX_STOP_DISTANCE_POINTS=30.0

      # Pepperstone-style account profile.
      - ACCOUNT_PROFILE=PS_ACC
      - INITIAL_EQUITY=5000
      - ACCOUNT_CURRENCY=EUR
      - MARGIN_REQUIREMENT_PCT=5
      - RISK_PER_TRADE_PCT=1.5
      - MAX_MARGIN_PCT=45
      - CONTRACT_MULTIPLIER=1.0
      - LOT_SIZE=0.1
      - EURUSD_RATE=1.0

      # Live bid/ask ticks already include spread. Keep extra spread/slippage off by default.
      - SPREAD_POINTS=0.0
      - SLIPPAGE_POINTS=0.0
      - COMMISSION_PER_UNIT=0.0

      # Risk resampling.
      - MONTE_CARLO_ENABLED=true
      - MONTE_CARLO_SIMULATIONS=2000
      - MC_EXTRA_SLIPPAGE_POINTS=0.5
      - MC_BLOCK_SIZE=5
      - MC_RUIN_DRAWDOWN_PCT=50.0
      - MC_RANDOM_SEED=12345

      # Walk-forward parameter optimizer.
      - PARAMETER_GRID_PATH=parameter_grid.ini
      - WF_TRAIN_DAYS=30
      - WF_TEST_DAYS=20
      - WF_STEP_DAYS=20
      - WF_TRAIN_TOP_N_PER_FOLD=30
      - OPTIMIZER_PROCESSES=6
      - OPTIMIZER_PROCESS_CHUNK_SIZE=64
      - OPTIMIZER_PROFILE_CACHE_SIZE=4
      - OPTIMIZER_PROGRESS_LOG_EVERY=5000
      - OPTIMIZER_PROGRESS_LOG_SECONDS=60
      - STAGE1_MAX_PARAMETER_SETS=4096
      - STAGE1_SCREENING_ENABLED=true
      - STAGE1_SCREENING_ROUNDS=2
      - STAGE1_SCREENING_TRAIN_DAYS=10
      - STAGE1_SCREENING_TOP_N=512
      - STAGE2_ENABLED=false
      - STAGE2_SEED_TOP_N=8
      - STAGE2_MAX_PARAMETER_SETS=512
      - MC_SCORE_TOP_N=30
      - PERSIST_TOP_TRADES_N=10
      - MIN_OOS_TRADES=100
      - MIN_OOS_PROFIT_FACTOR=1.1
      - MAX_OOS_DRAWDOWN_PCT=25.0
      - MAX_MC_RUIN_PCT=5.0
    networks:
      - shared_net

networks:
  shared_net:
    external: true
