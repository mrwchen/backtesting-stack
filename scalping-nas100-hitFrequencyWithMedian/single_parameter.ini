# Manual per-session parameters for RUN_MODE=single.
#
# Phase 0 baseline test: ONE global parameter set applied identically to every
# session, to verify whether the underlying median-cross edge is real once the
# per-session specialization (the overfitting source) is removed.
#
# Values are taken verbatim from the most robust walk-forward global candidate
# (run_id=1, stage1 rank 1): train PF 1.49 / OOS PF 1.46, OOS +310% over 439
# trades, full fold coverage. All sessions share the same set on purpose.

[asia_early]
LOOKBACK_BARS = 180
LONG_CROSS_QUANTILE = 0.55
SHORT_CROSS_QUANTILE = 0.50
ENTRY_PRICE_RANGE_POSITION_MAX_DEVIATION_PCT = 45.0
ALL_STOP_MODES_TAKE_PROFIT_ATR_MULT = 24.0
BAND_STOP_MIN_PROFILE_RANGE_ATR_MULT = 6.0
BAND_STOP_PROFILE_LOWER_QUANTILE = 0.025
BAND_STOP_PROFILE_UPPER_QUANTILE = 0.975
BAND_STOP_PROFILE_BUFFER_POINTS = 0.0
BAND_STOP_MIN_DISTANCE_ATR_MULT = 3.0
BAND_STOP_MAX_DISTANCE_ATR_MULT = 6.0

