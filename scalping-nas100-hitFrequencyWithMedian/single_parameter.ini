# Manual per-session parameters for RUN_MODE=single.
#
# Phase 2 validation: ONE static global parameter set applied identically to
# every session, to check whether a single fixed config holds over the full
# period (the live-deployment candidate, vs. the re-optimizing walk-forward).
#
# Values are the per-parameter MEDIAN of the 13 global sets selected fold-by-fold
# in walk-forward run_id=16 / stage2 (PF 1.37, +161% OOS, 76.9% profitable folds).
# This is the robust consensus of the walk-forward picks, not a single lucky fold.

[asia_early]
LOOKBACK_BARS = 180
LONG_CROSS_QUANTILE = 0.55
SHORT_CROSS_QUANTILE = 0.475
ENTRY_PRICE_RANGE_POSITION_MAX_DEVIATION_PCT = 35.0
ALL_STOP_MODES_TAKE_PROFIT_ATR_MULT = 24.0
BAND_STOP_MIN_PROFILE_RANGE_ATR_MULT = 6.0
BAND_STOP_PROFILE_LOWER_QUANTILE = 0.075
BAND_STOP_PROFILE_UPPER_QUANTILE = 0.9625
BAND_STOP_PROFILE_BUFFER_POINTS = 0.0
BAND_STOP_MIN_DISTANCE_ATR_MULT = 1.5
BAND_STOP_MAX_DISTANCE_ATR_MULT = 6.0

