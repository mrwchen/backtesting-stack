services:
  # Einmaliger Init-Job: legt die scalp_*-Ergebnis-Tabellen via ./init/schema.sql an.
  # DROP_ALL_SCALP_TABLES_ON_START=true droppt sie vorher (frischer Lauf).
  init-scalp-schema:
    image: postgres:17-alpine
    restart: "no"
    volumes:
      - ./init/schema.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres-ts-root-pw
      DROP_ALL_SCALP_TABLES_ON_START: "true"
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -v drop_scalp_tables_on_start="$${DROP_ALL_SCALP_TABLES_ON_START:-false}"
        -h timescaledb -p 5432 -U postgres-ts -d postgres -f /init.sql
    networks:
      - shared_net

  scalp-backtest-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      init-scalp-schema:
        condition: service_completed_successfully
    environment:
      # ── Datenbank (TimescaleDB aus dem Infra-Stack) ──────────────────────────
      - PGHOST=timescaledb
      - PGPORT=5432
      - PGDATABASE=postgres
      - PGUSER=market-data-account
      - PGPASSWORD=market-data-account-pw
      - PGAPPNAME=scalp_backtest_runner
      - PGOPTIONS=-c search_path=public
      - RESULT_SCHEMA=public
      - DB_CONNECT_TIMEOUT_SECONDS=10
      - DB_CONNECT_RETRIES=5
      - DB_CONNECT_RETRY_DELAY_SECONDS=5.0
      - DB_STATEMENT_TIMEOUT_MS=120000
      - DB_LOCK_TIMEOUT_MS=5000
      - DB_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS=120000
      - LOG_LEVEL=INFO
      - RUN_LABEL_TZ=Europe/Berlin
      - RUN_NOTES_EXTRA=

      # ── Datenquelle ──────────────────────────────────────────────────────────
      # Kursdaten aus public.ibkr_market_data. Symbol und bar_size frei waehlbar.
      - SOURCE_TABLE=ibkr_market_data
      - SYMBOL=NQ
      - BAR_SIZE=1 min
      # Leer = automatisch gesamter verfuegbarer Bereich fuer Symbol/bar_size.
      - START_DATE=
      - END_DATE=

      # ═════════════════════════════════════════════════════════════════════════
      # LAYER-SCHALTER
      # Waehlt pro Schicht das Modell. Das sind die vier Haupt-Umschalter.
      # ═════════════════════════════════════════════════════════════════════════
      - PRICE_MODEL=kalman           # Layer 2: kalman | state_space
      - VOL_MODEL=garch              # Layer 3: garch | egarch
      - DECISION_MODEL=logistic      # Layer 4: bayes | logistic

      # ═════════════════════════════════════════════════════════════════════════
      # FEATURE-FENSTER
      # Laenge der Indikator-Fenster, die als Eingangssignale in die
      # Entscheidungs-Schicht gehen (und ATR fuer ATR-basierte Stops).
      # Kuerzer = reaktiver/nervoeser, laenger = glatter/traeger.
      # ═════════════════════════════════════════════════════════════════════════
      - RSI_PERIOD=14                # RSI-Periode
      - ROLL_VOL_BARS=20             # Fenster der rollierenden Volatilitaet
      - MOMENTUM_BARS=10             # Lookback fuer Momentum (Log-Return ueber N Bars)
      - ATR_BARS=14                  # ATR-Periode (Wilder)

      # ═════════════════════════════════════════════════════════════════════════
      # LAYER 1 — REGIME (HMM)
      # Hidden-Markov-Modell erkennt Marktphasen (ruhig vs. turbulent).
      # High-Vol wird vorerst hart geblockt; der letzte Lauf zeigte dort negative Edge.
      # ═════════════════════════════════════════════════════════════════════════
      - REGIME_STATES=2              # Anzahl versteckter Zustaende
      - REGIME_BLOCK_HIGH_VOL_STATE=true    # true = im turbulentesten Regime hart blocken, wenn HIGH_VOL_GATE_ENABLED=false
      - HMM_N_ITER=100               # max. EM-Iterationen beim Fit
      - HMM_COVARIANCE_TYPE=diag     # diag | full | tied | spherical
      - HMM_MIN_COVAR=0.000001       # Mindest-Kovarianz fuer stabilere HMM-Fits

      # ═════════════════════════════════════════════════════════════════════════
      # LAYER 2 — PREISPROZESS (Kalman-Rauschen)
      # Selbstskalierende Rauschmultiplikatoren des Local-Linear-Trend-Filters
      # (nur relevant bei PRICE_MODEL=kalman). Hoeher = glatter, traeger.
      # ═════════════════════════════════════════════════════════════════════════
      - KF_OBS_NOISE_MULT=1.0        # Messrauschen
      - KF_LEVEL_NOISE_MULT=0.1      # Level-Prozessrauschen
      - KF_TREND_NOISE_MULT=0.001    # Trend-Prozessrauschen

      # ═════════════════════════════════════════════════════════════════════════
      # LAYER 3 — VOLATILITAET (GARCH/EGARCH-Detail)
      # Ordnung des Vola-Modells und Fehlerverteilung. studentst/ged fangen
      # fette Raender (Tail-Risiko) besser als normal.
      # ═════════════════════════════════════════════════════════════════════════
      - GARCH_P=1                    # ARCH-Ordnung
      - GARCH_Q=1                    # GARCH-Ordnung
      - GARCH_DIST=normal            # normal | studentst | skewt | ged

      # ═════════════════════════════════════════════════════════════════════════
      # LAYER 4 — ENTSCHEIDUNG (Klassifikator-Detail + Bandpass-Gates)
      # ═════════════════════════════════════════════════════════════════════════
      - DECISION_GATE_MODE=side_regime_bandpass # global_bandpass | side_regime_bandpass
      - PROB_THRESHOLD=0.52          # Globaler Mindestwert fuer Trade-Win-Wahrscheinlichkeit
      - MAX_PROB_THRESHOLD=0.74      # Globaler oberer Probability-Cutoff; leer/none = keine Obergrenze
      - MIN_EXPECTED_NET_R=0.14      # Globaler Mindest-Erwartungswert nach Kosten in R-Einheiten
      - MAX_EXPECTED_NET_R=0.85      # Globaler oberer Expected-R-Cutoff; leer/none = keine Obergrenze
      - LOGISTIC_C=1.0               # Regularisierung der Logit-Regression (klein = staerker)
      - CALIBRATE_PROBABILITIES=true # Kalibriert Trade-Win-Wahrscheinlichkeiten im Vergangenheitsfenster
      - MIN_TRAIN_ROWS=50            # Mindestanzahl Trainingszeilen, sonst kein Signal
      - CANDIDATE_ALLOW_HIGH_VOL=false
      - MIN_CANDIDATE_SCORE=0.20
      - MAX_CANDIDATES_PER_BAR=3
      - LONG_REGIME0_PULLBACK_RECLAIM_ENABLED=true
      - LONG_REGIME0_TREND_CONTINUATION_ENABLED=true
      - SHORT_REGIME1_BOUNCE_REJECT_ENABLED=true
      - SHORT_REGIME1_CONTINUATION_ENABLED=true
      - HIGH_VOL_GATE_ENABLED=false  # false + REGIME_BLOCK_HIGH_VOL_STATE=true = High-Vol hart blocken
      - LONG_REGIME0_GATE_ENABLED=true
      - LONG_REGIME0_MIN_PROB=0.53
      - LONG_REGIME0_MAX_PROB=0.74
      - LONG_REGIME0_MIN_EXPECTED_NET_R=0.16
      - LONG_REGIME0_MAX_EXPECTED_NET_R=0.85
      - LONG_REGIME1_GATE_ENABLED=false
      - LONG_REGIME1_MIN_PROB=0.58
      - LONG_REGIME1_MAX_PROB=0.68
      - LONG_REGIME1_MIN_EXPECTED_NET_R=0.28
      - LONG_REGIME1_MAX_EXPECTED_NET_R=0.60
      - SHORT_REGIME0_GATE_ENABLED=false
      - SHORT_REGIME0_MIN_PROB=0.62
      - SHORT_REGIME0_MAX_PROB=0.66
      - SHORT_REGIME0_MIN_EXPECTED_NET_R=0.42
      - SHORT_REGIME0_MAX_EXPECTED_NET_R=0.60
      - SHORT_REGIME1_GATE_ENABLED=true
      - SHORT_REGIME1_MIN_PROB=0.52
      - SHORT_REGIME1_MAX_PROB=0.74
      - SHORT_REGIME1_MIN_EXPECTED_NET_R=0.14
      - SHORT_REGIME1_MAX_EXPECTED_NET_R=0.80
      - HIGH_VOL_LONG_GATE_ENABLED=false
      - HIGH_VOL_LONG_MIN_PROB=0.62
      - HIGH_VOL_LONG_MAX_PROB=0.70
      - HIGH_VOL_LONG_MIN_EXPECTED_NET_R=0.45
      - HIGH_VOL_LONG_MAX_EXPECTED_NET_R=0.80
      - HIGH_VOL_SHORT_GATE_ENABLED=false
      - HIGH_VOL_SHORT_MIN_PROB=0.62
      - HIGH_VOL_SHORT_MAX_PROB=0.70
      - HIGH_VOL_SHORT_MIN_EXPECTED_NET_R=0.45
      - HIGH_VOL_SHORT_MAX_EXPECTED_NET_R=0.80

      # ═════════════════════════════════════════════════════════════════════════
      # WALK-FORWARD-FITTING
      # Wie oft und auf welchem Fenster die Schichten neu gefittet werden.
      # ═════════════════════════════════════════════════════════════════════════
      - WARMUP_BARS=1500             # Anlauf-Bars vor dem ersten Trade
      - TRAIN_WINDOW_BARS=20000      # 0 = expandierend, sonst rollierendes Fenster
      - REFIT_EVERY_BARS=250         # Neu-Fit-Intervall in Bars

      # ═════════════════════════════════════════════════════════════════════════
      # STOP-LOSS / TAKE-PROFIT-LOGIK
      # STOP_MODE = Distanzbasis (vol = GARCH-Sigma, atr = ATR).
      # TP_MODE   = Ausstieg (fixed = harter TP, trailing = nachziehender Stop).
      # Die Multiplikatoren wirken auf die jeweilige Basis; MIN/MAX_STOP_PCT
      # begrenzen die Stop-Distanz (in % vom Preis) und damit die Positionsgroesse.
      # ═════════════════════════════════════════════════════════════════════════
      - STOP_MODE=atr                # vol | atr
      - TP_MODE=fixed                # fixed | trailing
      - STOP_VOL_MULT=2.0            # Stop = N x Sigma (bei STOP_MODE=vol)
      - TP_VOL_MULT=3.0              # TP   = N x Sigma (bei STOP_MODE=vol)
      - STOP_ATR_MULT=2.0            # Stop = N x ATR   (bei STOP_MODE=atr)
      - TP_ATR_MULT=3.0              # TP   = N x ATR   (bei STOP_MODE=atr)
      - TRAILING_ACTIVATION_MULT=2.0 # Trailing aktiviert nach N x Basis Gewinn (TP_MODE=trailing)
      - TRAILING_DISTANCE_MULT=1.5   # Trailing-Abstand = N x Basis        (TP_MODE=trailing)
      - MIN_STOP_PCT=0.05            # untere Schranke Stop-Distanz (% vom Preis)
      - MAX_STOP_PCT=0.6             # obere Schranke Stop-Distanz (% vom Preis)
      - MAX_HOLD_BARS=60             # Zwangs-Exit nach N Bars
      - ALLOW_SHORT=true             # Short-Seite an/aus

      # ═════════════════════════════════════════════════════════════════════════
      # TRADE-MANAGEMENT
      # ═════════════════════════════════════════════════════════════════════════
      - REENTRY_COOLDOWN_BARS=0      # Wartezeit (Bars) nach Exit vor neuem Einstieg
      - INTRABAR_FILL_PRIORITY=stop  # stop | tp  (wer gewinnt, wenn beide in einer Bar triggern)

      # ═════════════════════════════════════════════════════════════════════════
      # SESSION (Intraday-only, flat zum Cutoff)
      # ═════════════════════════════════════════════════════════════════════════
      - ENTRY_START_TIME=09:30       # erste Signal-Bar in SESSION_TZ
      - ENTRY_END_TIME=15:45         # keine neuen Einstiege ab dieser Uhrzeit
      - SESSION_FLAT_TIME=16:55
      - SESSION_TZ=America/New_York

      # ═════════════════════════════════════════════════════════════════════════
      # ACCOUNT: PS_ACC (Pepperstone-artiges Index-CFD-Konto)
      # ═════════════════════════════════════════════════════════════════════════
      - ACCOUNT_PROFILE=PS_ACC
      - INITIAL_EQUITY=5000          # Startkapital
      - ACCOUNT_CURRENCY=EUR
      - MARGIN_REQUIREMENT_PCT=5     # Margin = 5 % des Nominalwerts
      - RISK_PER_TRADE_PCT=1.5       # Risiko pro Trade in % des Equity
      - MAX_MARGIN_PCT=45            # max. Margin-Auslastung pro Position
      - CONTRACT_MULTIPLIER=1.0      # Punktwert je Einheit (CFD: 1.0)
      - LOT_SIZE=0.1                 # Mindest- und Schrittgroesse in CFD-Lots
      - EURUSD_RATE=1.0              # USD je 1 EUR; 1.0 = keine Umrechnung

      # ═════════════════════════════════════════════════════════════════════════
      # KOSTEN
      # ═════════════════════════════════════════════════════════════════════════
      - SPREAD_POINTS=1.2            # Pepperstone NAS100 Standard: ca. 1.2 Punkte avg Spread
      - SLIPPAGE_POINTS=0.3          # konservative Zusatzslippage pro Roundtrip in Punkten
      - SPREAD_BPS=0.0               # Legacy: bps-Kosten sind fuer NAS100 deaktiviert
      - SLIPPAGE_BPS=0.0             # Legacy: bps-Kosten sind fuer NAS100 deaktiviert
      - COMMISSION_PER_UNIT=0.0      # Kommission je Einheit (beide Legs)

      # ═════════════════════════════════════════════════════════════════════════
      # LAYER 5 — MONTE-CARLO-RISIKO
      # Resampling der Trade-Reihenfolge fuer Drawdown-/Ruin-Verteilung,
      # plus Slippage-Stress und Block-Bootstrap (Sequenzrisiko).
      # ═════════════════════════════════════════════════════════════════════════
      - MONTE_CARLO_ENABLED=true
      - MONTE_CARLO_SIMULATIONS=2000 # Anzahl Simulationen
      - MC_EXTRA_SLIPPAGE_POINTS=0.5 # Zusatz-Slippage im Stress-Szenario (Roundtrip-Punkte)
      - MC_EXTRA_SLIPPAGE_BPS=0.0    # Legacy: bps-Stress deaktiviert
      - MC_BLOCK_SIZE=5              # Blocklaenge fuer Sequenz-Bootstrap
      - MC_RUIN_DRAWDOWN_PCT=50.0    # Verlustschwelle, ab der ein Pfad als "Ruin" zaehlt
      - MC_RANDOM_SEED=12345         # fester Seed = reproduzierbar
    networks:
      - shared_net

networks:
  shared_net:
    external: true
