services:
  bt-signals-runner:
    image: python:3.13-slim
    container_name: bt-signals-runner
    working_dir: /app
    volumes:
      - ./:/app
    networks:
      - shared_net
    environment:
      PGHOST: "db"
      PGPORT: "5432"
      PGUSER: backtesting-account
      PGPASSWORD: backtesting-account-pw
      PGSOURCE_DB: market-data
      PGTARGET_DB: backtesting

      # Skript-Konfiguration
      START_DATE: "2020-01-01"
      SYMBOL: "NAS100"
      PROFILE: "Stabil"
      ENTRY_MODE: "Aggressiv"
      CONFIRMATION_MODE: "Break-and-Hold"
      TIMEFRAME: "1min"
      WARMUP_BARS: "500"
      SESSION_TIMEZONE: "UTC"

      # Filter-Schalter
      DISABLE_VWAP: "false"
      DISABLE_AUTO_RSI: "false"
      MANUAL_RSI_FILTER: "false"

      # Optional: Standardtabellen überschreiben
      SOURCE_TABLE: "public.market_data_1min"
      TARGET_TABLE: "public.bt_signal"
    command: >
      sh -lc '
        set -e
        pip install --no-cache-dir --disable-pip-version-check --root-user-action=ignore \
          numpy pandas tzdata sqlalchemy "psycopg[binary]"
        VWAP_FLAG=""
        if [ "$$DISABLE_VWAP" = "true" ]; then VWAP_FLAG="--disable-vwap"; fi
        AUTO_RSI_FLAG=""
        if [ "$$DISABLE_AUTO_RSI" = "true" ]; then AUTO_RSI_FLAG="--disable-auto-rsi"; fi
        MANUAL_RSI_FLAG=""
        if [ "$$MANUAL_RSI_FILTER" = "true" ]; then MANUAL_RSI_FLAG="--manual-rsi-filter"; fi
        python /app/bt_signals_from_market_data_1min.py \
          --start-date "$$START_DATE" \
          --symbol "$$SYMBOL" \
          --profile "$$PROFILE" \
          --entry-mode "$$ENTRY_MODE" \
          --confirmation-mode "$$CONFIRMATION_MODE" \
          --timeframe "$$TIMEFRAME" \
          --warmup-bars "$$WARMUP_BARS" \
          --session-timezone "$$SESSION_TIMEZONE" \
          --source-table "$$SOURCE_TABLE" \
          --target-table "$$TARGET_TABLE" \
          $$VWAP_FLAG $$AUTO_RSI_FLAG $$MANUAL_RSI_FLAG
      '
networks:
  shared_net:
    external: true
    name: shared_net
