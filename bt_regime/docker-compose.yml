services:
  bt-regime-runner:
    image: python:3.13-slim
    container_name: bt-regime-runner
    working_dir: /app
    volumes:
      - ./:/app
    networks:
      - shared_net
    environment:
      # PostgreSQL auf dem Host.
      # Wenn PostgreSQL in einem anderen Container läuft, hier stattdessen den Servicenamen eintragen.
      PGHOST: "db"
      PGPORT: "5432"
      PGUSER: backtesting-account
      PGPASSWORD: backtesting-account-pw
      PGSOURCE_DB: market-data
      PGTARGET_DB: backtesting

      # Skript-Konfiguration
      START_DATE: "2020-01-01"
      SYMBOL: "NAS100"
      PROFILE: "Dynamisch"
      TIMEFRAME: "5min"
      WARMUP_BARS: "1000"

      # Location-Filter (Pine v2.2): "HMA" oder "Rolling VWAP"
      LOCATION_SOURCE: "HMA"
      RVWAP_LEN: "60"
      HMA_LEN: "21"
      DISABLE_LOCATION: "false"

      # Optional: Standardtabellen überschreiben
      SOURCE_TABLE: "public.market_data_5min"
      TARGET_TABLE: "public.bt_regime"
    command: >
      sh -lc '
        set -e
        pip install --no-cache-dir --upgrade pip && pip install --no-cache-dir numpy pandas tzdata sqlalchemy "psycopg[binary]"
        LOCATION_FLAG=""
        if [ "$$DISABLE_LOCATION" = "true" ]; then
          LOCATION_FLAG="--disable-location"
        fi
        python /app/bt_regime_from_market_data_5min.py \
          --start-date "$$START_DATE" \
          --symbol "$$SYMBOL" \
          --profile "$$PROFILE" \
          --timeframe "$$TIMEFRAME" \
          --warmup-bars "$$WARMUP_BARS" \
          --location-source "$$LOCATION_SOURCE" \
          --rvwap-len "$$RVWAP_LEN" \
          --hma-len "$$HMA_LEN" \
          --source-table "$$SOURCE_TABLE" \
          --target-table "$$TARGET_TABLE" \
          $$LOCATION_FLAG
      '
networks:
  shared_net:
    external: true
    name: shared_net