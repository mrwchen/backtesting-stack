services:
  nas-backtester-03:
    build: .
    container_name: nas-backtester-03
    networks:
      - shared_net
    environment:
      ACCOUNT_NUMBER: "00003"
      ACCOUNT_TYPE: "backtester"

      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"

      BT_DB_HOST: "db"
      BT_DB_PORT: "5432"
      BT_DB_USER: "backtesting-account"
      BT_DB_PASSWORD: "backtesting-account-pw"
      BT_DB_NAME: "backtesting"
      BT_DB_SSLMODE: "prefer"

      MARKET_DB_HOST: "db"
      MARKET_DB_PORT: "5432"
      MARKET_DB_USER: "backtesting-account"
      MARKET_DB_PASSWORD: "backtesting-account-pw"
      MARKET_DB_NAME: "market-data"
      MARKET_DB_SSLMODE: "prefer"

      INITIAL_EQUITY: "10000"
      SYMBOL_NAME: "NAS100"
      TIMEFRAME: "1min"
      REQUIRED_MARGIN: "0.05"
      SPREAD_POINTS: "1.5"        # Fallback wenn USE_DYNAMIC_SPREAD=false
      POSITION_FRACTION_OF_MAX_MARGIN: "0.30"
      RISK_FRACTION_OF_USED_MARGIN: "0.03"
      LOT_STEP: "0.1"
      START_TIME_UTC: "2025-01-01T00:00:00"
      END_TIME_UTC: ""

      # ATR-basierter Stop
      ATR_PERIOD: "14"
      ATR_MULTIPLIER: "1.5"
      PIVOT_BUFFER_ATR_MULTIPLIER: "0.5"         # Phase 1: Puffer über/unter Pivot beim Entry
      TRAILING_BUFFER_ATR_MULTIPLIER: "0.1"     # Phase 2 früh: Puffer unter/über prev. Close
      TRAILING_BUFFER_ATR_MULTIPLIER_LATE: "0.05" # Phase 2 spät: engerer Puffer ab TRAILING_LATE_MINUTES

      # Trailing Stop & Timeout
      MAX_BARS_HELD: "180"
      TRAILING_ACTIVATION_RR: "1.5"       # Trailing startet ab X × risk_budget unrealisiertem Gewinn
      TRAILING_LATE_MINUTES: "20"         # Ab Minute X in Phase 2 engerer Trailing-Puffer
      BREAKEVEN_MINUTES: "20"             # Nach X Minuten SL auf Breakeven (nur Phase 1)
      BREAKEVEN_OFFSET_POINTS: "0.0"      # SL auf Entry + X Punkte (Long) / Entry - X Punkte (Short)

      # Entry-Fenster & wöchentlicher Close (Weekday: 0=Mo, 1=Di, 2=Mi, 3=Do, 4=Fr)
      ENTRY_START_WEEKDAY: "0"       # Mo
      ENTRY_START_HOUR_UTC: "7"      # ab 07:00 UTC
      ENTRY_END_WEEKDAY: "4"         # Fr
      ENTRY_END_HOUR_UTC: "19"       # bis 19:00 UTC (exklusiv)
      WEEKLY_CLOSE_WEEKDAY: "4"      # Fr
      WEEKLY_CLOSE_HOUR_UTC: "20"    # spätestens 20:00 UTC schließen

      # Dynamischer Spread je Session (us/europe/night)
      USE_DYNAMIC_SPREAD: "false"

      OUTPUT_DIR: "/app/output"
      LOG_LEVEL: "INFO"

    volumes:
      - ./output:/app/output
    command: ["python", "/app/backtest.py"]

networks:
  shared_net:
    external: true
    name: shared_net