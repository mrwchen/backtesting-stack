services:
  # Einmaliger Init-Job vor dem Runner.
  # Fuehrt ausschliesslich das SQL aus ./init/schema.sql gegen TimescaleDB aus.
  # Wichtig: DROP_ALL_BACKTEST_TABLES_ON_START steuert, ob die Backtest-Resultat-
  # Tabellen beim Start geloescht und frisch angelegt werden.
  init-backtest-schema:
    image: postgres:17-alpine
    restart: "no"
    volumes:
      - ./init/schema.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres-ts-root-pw
      # true = Backtest-Resultat-Tabellen werden vor dem Run gedroppt.
      # false = Schema wird nur angelegt/validiert, vorhandene Ergebnisse bleiben.
      DROP_ALL_BACKTEST_TABLES_ON_START: true
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -v drop_backtest_tables_on_start="$${DROP_ALL_BACKTEST_TABLES_ON_START:-false}"
        -h timescaledb -p 5432 -U postgres-ts -d postgres -f /init.sql
    networks:
      - shared_net

  backtest-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      init-backtest-schema:
        condition: service_completed_successfully
    environment:
      # ---------------------------------------------------------------------
      # Datenbankverbindung und Ergebnis-Schema
      #
      # Verbindet den Runner mit der TimescaleDB aus dem Infra-Stack.
      # PGAPPNAME wird an Postgres uebergeben und ist in pg_stat_activity sichtbar.
      # RESULT_SCHEMA legt fest, in welchem Schema backtest_runs/-trades usw. liegen.
      # Timeouts schuetzen vor haengenden Queries oder Locks.
      # ---------------------------------------------------------------------
      - PGHOST=timescaledb
      - PGPORT=5432
      - PGDATABASE=postgres
      - PGUSER=market-data-account
      - PGPASSWORD=market-data-account-pw
      - PGAPPNAME=backtest_runner
      - PGOPTIONS=-c search_path=public
      - RESULT_SCHEMA=public
      - DB_CONNECT_TIMEOUT_SECONDS=10
      - DB_CONNECT_RETRIES=5
      - DB_CONNECT_RETRY_DELAY_SECONDS=5.0
      - DB_STATEMENT_TIMEOUT_MS=60000
      - DB_LOCK_TIMEOUT_MS=5000
      - DB_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS=60000
      # Bei einem TimescaleDB-Restart darf ein paralleler Worker mit reservierter
      # run_id den eigenen unvollstaendigen Run bereinigen und neu starten.
      - BACKTEST_WORKER_DB_RETRY_ATTEMPTS=2
      - BACKTEST_WORKER_DB_RETRY_DELAY_SECONDS=10.0

      # ---------------------------------------------------------------------
      # Run-Metadaten und Logging
      #
      # LOG_LEVEL steuert die Ausfuehrlichkeit.
      # RUN_LABEL_TZ bestimmt die Zeitzone fuer automatisch erzeugte Run-Labels.
      # RUN_NOTES_EXTRA wird in backtest_runs.notes geschrieben, damit du spaeter
      # erkennst, welche Sonderkonfiguration aktiv war.
      # ---------------------------------------------------------------------
      - LOG_LEVEL=INFO
      - RUN_LABEL_TZ=Europe/Berlin

      # ---------------------------------------------------------------------
      # Quelltabellen und Point-in-Time-Sicherheit
      #
      # Diese Tabellen liefern 1h-Bars, Fundamentals und World-Regime-Daten.
      # REQUIRE_USD_FUNDAMENTALS verhindert gemischte Waehrungsdaten in der
      # Fundamentalauswahl.
      # ALLOW_REBUILT_HISTORICAL_FUNDAMENTALS=false ist konservativ: es nutzt
      # nur historisch verfuegbare/as-of Daten und vermeidet Look-Ahead Bias.
      # ---------------------------------------------------------------------
      - SOURCE_MARKET_DATA_1H_TABLE=alpaca_market_data_1h
      - TRADING_CALENDAR_SYMBOLS=AAPL,NVDA,GOOG
      - SOURCE_FUNDAMENTAL_SCORES_TABLE=stock_scorer_fundamental_scores
      - SOURCE_WORLD_REGIME_TABLE=world_regime_daily_scores_mv
      - REQUIRE_USD_FUNDAMENTALS=true
      - ALLOW_REBUILT_HISTORICAL_FUNDAMENTALS=false

      # ---------------------------------------------------------------------
      # Backtest-Zeitraum
      #
      # START_DATE und END_DATE begrenzen den Simulationszeitraum.
      # Die Datenquelle muss fuer diesen Zeitraum 1h-Bars, Fundamentals und
      # Regime-Daten liefern koennen.
      # ---------------------------------------------------------------------
      - START_DATE=2020-01-01
      - END_DATE=2026-05-01

      # ---------------------------------------------------------------------
      # Modellauswahl und Modell-Konfiguration
      #
      # MODEL_SELECTION:
      # single = nur MODEL_FILE ausfuehren.
      # multi  = kommaseparierte MODEL_FILES ausfuehren.
      # all    = alle *.py Modelle aus ./backtest_models ausfuehren.
      #
      # Modell-spezifische Parameter liegen in:
      # ./backtest_model_configs/<model_stem>.env
      #
      # MODEL_PARALLELISM ist die Anzahl paralleler Modell/Account-Worker.
      # Hoeher nutzt mehr CPU, kann aber TimescaleDB/IO staerker belasten.
      # Auf dem 8-Core-Server ist 4 konservativ; 6 ist ein sinnvoller Testwert.
      #
      # MODEL_FAILURE_MODE=continue bedeutet: ein fehlerhafter Worker stoppt
      # nicht automatisch alle anderen Worker.
      # ---------------------------------------------------------------------
      #- MODEL_SELECTION=all
      #- MODEL_SELECTION=single
      #- MODEL_FILE=benchmark_qqq.py
      - MODEL_SELECTION=multi
      - MODEL_FILES=benchmark_qqq.py,qqq_engine_probe.py
      #- MODEL_FILES=adaptive_entry_swing_v1.py,sector_rotation_long_short_v1.py,filing_aware_fundamental_momentum_v1.py,relative_strength_momentum_v1.py
      # - MODEL_FILES=adaptive_entry_swing_v1.py,deep_pullback_quality_mean_reversion_v1.py,failed_breakout_reversal_v1.py,filing_aware_fundamental_momentum_v1.py,pullback_bounce_fundamental_v1.py,quality_breakout_fundamental_v1.py,relative_strength_momentum_v1.py,sector_rotation_long_short_v1.py,statistical_direction_probability_v1.py,trend_pullback_reclaim_v1.py,volatility_contraction_breakout_v1.py,weak_fundamental_breakdown_v1.py
      - MODEL_CONFIG_DIR=/app/backtest_model_configs
      - MODEL_CONFIG_REQUIRED=true
      # true = alle Modell-Configs nutzen nur composite_score (rel/peer).
      #        composite_score_abs-Mix und absolute Score-Filter werden ignoriert.
      - FUNDAMENTAL_RELATIVE_SCORE_ONLY=true
      - MODEL_PARALLELISM=4
      - MODEL_FAILURE_MODE=continue

      # ---------------------------------------------------------------------
      # Laufzeit-Performance, Fortschritt und Caches
      #
      # PROGRESS_LOG_EVERY_DAYS bestimmt, wie oft Tagesfortschritt geloggt wird.
      #
      # DECISION_EVENT_MODE:
      # all     = schreibt alle Kandidaten- und Entscheidungsdetails.
      # signals = schreibt angenommene Intents plus Tages-/Skip-Zusammenfassungen.
      # summary = schreibt nur geoeffnete Trades und Tages-/Skip-Zusammenfassungen.
      # none    = schreibt keine Decision-Events; schnellster Modus, weniger Diagnose.
      #
      # *_FLUSH_BATCH_SIZE sammelt Events im Speicher, bevor geschrieben wird.
      # *_INSERT_PAGE_SIZE steuert, wie viele Zeilen pro SQL-Insert-Paket gesendet
      # werden. Groessere Werte reduzieren Roundtrips, brauchen aber kurzzeitig
      # etwas mehr RAM pro Worker.
      #
      # BAR_CACHE_* ist der allgemeine 1h-Bar-Cache fuer Positions-/Exit-Logik.
      # SIGNAL_BAR_CACHE_* ist ein kompakter Cache fuer Signalentscheidungen.
      # CANDIDATE_TIMELINE_CACHE_* baut die Fundamental-Kandidaten zeitlich vor
      # und teilt den Cache ueber Worker via /tmp.
      # ---------------------------------------------------------------------
      - PROGRESS_LOG_EVERY_DAYS=25
      - DECISION_EVENT_MODE=signals
      - DECISION_EVENT_FLUSH_BATCH_SIZE=25000
      - TRADE_INSERT_PAGE_SIZE=1000
      - ACCOUNT_CURVE_INSERT_PAGE_SIZE=2000
      - DECISION_EVENT_INSERT_PAGE_SIZE=2500
      - BAR_CACHE_WARMUP_DAYS=120
      - BAR_CACHE_BATCH_SIZE=200
      - BAR_CACHE_MAX_MIB=3072
      - SIGNAL_BAR_CACHE_ENABLED=true
      - SIGNAL_BAR_MAX_STALENESS_HOURS=2.0
      - SIGNAL_BAR_CACHE_MAX_MIB=3072
      - CANDIDATE_TIMELINE_CACHE_ENABLED=true
      - CANDIDATE_TIMELINE_CACHE_MAX_MIB=3072
      - CANDIDATE_TIMELINE_CURSOR_ITERSIZE=10000
      - CANDIDATE_TIMELINE_SHARED_CACHE_DIR=/tmp/backtest_candidate_timeline_cache

      # ---------------------------------------------------------------------
      # Account-Auswahl und Portfolio-Risiko
      #
      # ACCOUNT_PROFILE:
      # ps_acc   = Pepperstone EU Retail US Share CFD Regeln.
      # ibkr_acc = Interactive Brokers Margin-Regeln.
      # all      = jedes ausgewaehlte Modell einmal fuer ps_acc und ibkr_acc.
      #
      # INITIAL_EQUITY_USD ist das Startkapital je Run.
      # RISK_PER_TRADE_EQUITY_PCT ist der Basiseinsatz pro Trade vor Regime-,
      # Shock- und Broker-Anpassungen.
      # MAX_OPEN_POSITIONS begrenzt die Portfolio-Groesse.
      # MAX_POSITION_OPENS_PER_DAY begrenzt alle Positionseroeffnungen pro
      # Trading-Tag, inklusive initialer Opens und Refill-Opens nach SL/TP.
      # MAX_POSITION_OPENS_PER_HOUR begrenzt alle Positionseroeffnungen pro
      # UTC-Bucket der simulierten Entry-Zeit, inklusive Refill-Opens.
      # SECTOR_DIVERSIFICATION_ENABLED aktiviert sektorale Streuungsregeln.
      # ---------------------------------------------------------------------
#      - ACCOUNT_PROFILE=all
      - ACCOUNT_PROFILE=ps_acc
      - INITIAL_EQUITY_USD=5000
      - RISK_PER_TRADE_EQUITY_PCT=1.5
      - MAX_OPEN_POSITIONS=5
      - MAX_POSITION_OPENS_PER_DAY=2
      - MAX_POSITION_OPENS_PER_HOUR=1
      - SECTOR_DIVERSIFICATION_ENABLED=false
      - DAILY_POLICY_TZ=America/New_York
      - DAILY_POLICY_WORLD_REGIME_MA_DAYS=5
      - DAILY_POLICY_WORLD_REGIME_TREND_DAYS=2
      - DAILY_POLICY_WORLD_REGIME_STRESS_THRESHOLD=45.0
      - DAILY_POLICY_WORLD_REGIME_HIGH_STRESS_THRESHOLD=60.0
      - DAILY_POLICY_LOW_STRESS_MAX_LONG_POSITIONS=5
      - DAILY_POLICY_LOW_STRESS_MAX_SHORT_POSITIONS=0
      - DAILY_POLICY_INITIAL_PREVIOUS_MAX_LONG_POSITIONS=5
      - DAILY_POLICY_STRESS_RISK_REDUCTION_PCT=0.5
      - DAILY_POLICY_STRESS_BUILD_MAX_LONG_DELTA=-1
      - DAILY_POLICY_STRESS_RECOVERY_MAX_LONG_DELTA=1
      - DAILY_POLICY_STRESS_SIDEWAYS_MAX_LONG_DELTA=0
      - DAILY_POLICY_HIGH_STRESS_MAX_LONG_POSITIONS=0
      - DAILY_POLICY_HIGH_STRESS_MAX_SHORT_POSITIONS=2
      - DAILY_POLICY_MIN_HOURS_BETWEEN_OPENS=3.0
      - DAILY_POLICY_SL_HALT_WINDOW_HOURS=2.0
      - DAILY_POLICY_SL_HALT_COUNT=3
      - DAILY_POLICY_SL_HALT_STATUSES=HIT_SL,REGIME_RISK_LONG_HIT_SL,REGIME_RISK_SHORT_HIT_SL
      - DAILY_POLICY_MARKET_DROP_SYMBOL=VOO
      - DAILY_POLICY_MARKET_DROP_THRESHOLD_PCT=3.5
      - DAILY_POLICY_MARKET_DROP_TZ=America/New_York
      - DAILY_POLICY_MARKET_DROP_SESSION_START=09:30
      - DAILY_POLICY_MARKET_DROP_SESSION_END=16:00
      - DAILY_POLICY_MARKET_DROP_OPEN_BAR_MODE=at_or_after
      - DAILY_POLICY_MARKET_DROP_PRICE_FIELD=low
      - DAILY_POLICY_PRUNE_TIME_TZ=America/New_York
      - DAILY_POLICY_PRUNE_TIME=11:00
      - DAILY_POLICY_TECH_STRESS_LOOKBACK_DAYS=3
      - DAILY_POLICY_TECH_STRESS_THRESHOLD=60.0
      - DAILY_POLICY_BLOCK_LONG_SECTOR=Technology
      - DAILY_POLICY_ENERGY_SHOCK_LOOKBACK_DAYS=3
      - DAILY_POLICY_ENERGY_SHOCK_THRESHOLD=60.0
      - DAILY_POLICY_PREFERRED_INDUSTRY=Oil & Gas Integrated
      - DAILY_POLICY_LOOKBACK_CALENDAR_DAYS=45
      # INTENT_SCORE_CLUSTERING_ENABLED mischt Kandidaten nur innerhalb naher
      # Intent-Score-Cluster. Der Seed macht einzelne Runs reproduzierbar.
      - INTENT_SCORE_CLUSTERING_ENABLED=true
      - INTENT_SCORE_CLUSTER_DELTA=0.50
      - INTENT_SCORE_CLUSTER_MIN_SIZE=2
      - INTENT_SCORE_CLUSTER_RANDOM_SEED=12345

      # ---------------------------------------------------------------------
      # Regimewechsel-Risikomanagement fuer bereits offene Positionen.
      #
      # Wirkt einmal pro Trading-Tag vor neuen Entries, nutzt nur das World-
      # Regime as-of Vortag und reagiert erst nach bestaetigten Stress-Tagen.
      # Recovery wird langsamer bestaetigt, damit taegliches Regime-Zappeln nicht
      # staendig Closings oder Stop-Aenderungen ausloest.
      # ---------------------------------------------------------------------
      - REGIME_RISK_MANAGEMENT_ENABLED=false
      - REGIME_RISK_NEUTRAL_IS_ELEVATED=false
      - REGIME_RISK_ELEVATED_CONFIRM_DAYS=1
      - REGIME_RISK_HIGH_CONFIRM_DAYS=1
      - REGIME_RISK_EXTREME_CONFIRM_DAYS=1
      - REGIME_RISK_RECOVERY_CONFIRM_DAYS=2
      - REGIME_RISK_MAX_CLOSE_FRACTION_PER_DAY=0.50
      - REGIME_RISK_POSITION_COOLDOWN_DAYS=1

      # Long-Stops werden in Stress-Phasen auf maximalen Abstand zum aktuellen
      # Tages-Entscheidungspreis gezogen. Es wird nie gelockert, nur enger.
      - REGIME_RISK_ELEVATED_LONG_MAX_STOP_DISTANCE_PCT=3.0
      - REGIME_RISK_HIGH_LONG_MAX_STOP_DISTANCE_PCT=2.0
      - REGIME_RISK_EXTREME_LONG_MAX_STOP_DISTANCE_PCT=1.0

      # Ziel-Caps fuer bestehende Long-Exposures in bestaetigtem Stress.
      - REGIME_RISK_HIGH_MAX_LONG_POSITIONS=1
      - REGIME_RISK_EXTREME_MAX_LONG_POSITIONS=0
      - REGIME_RISK_HIGH_CLOSE_EXCESS_LONGS=true
      - REGIME_RISK_RISK_OFF_CLOSE_LONGS=true

      # Selektive Reduktion: Value-Labels werden zuerst geschlossen,
      # begrenzt durch MAX_CLOSE_FRACTION_PER_DAY.
      - REGIME_RISK_HIGH_CLOSE_VALUATION_LABELS=deep_value,undervalued,value_trap
      - REGIME_RISK_EXTREME_CLOSE_VALUATION_LABELS=deep_value,undervalued,value_trap

      # ---------------------------------------------------------------------
      # Gemeinsame Policy: fundamentale Eligibility
      #
      # Dieser Vorfilter ist modellunabhaengig. Modelle liefern Symbol,
      # Richtung, Intent-Score und Begruendung; die gemeinsame Policy entscheidet,
      # ob ein Symbol aufgrund fundamentaler Mindestanforderungen ueberhaupt
      # handelbar ist.
      #
      # COMMON_LONG_MIN_FUNDAMENTAL = Mindestscore fuer Long-Kandidaten.
      # COMMON_SHORT_MAX_FUNDAMENTAL = Maximalscore fuer Short-Kandidaten.
      # *_LABEL_BLOCKLIST blockiert Bewertungslabels.
      # COMMON_MIN_MARKET_CAP_USD_M ist die Mindest-Marktkapitalisierung in Mio. USD.
      # Die High-Leverage/Earnings-Filter sind zusaetzliche Qualitaetsfilter.
      # ---------------------------------------------------------------------
      - COMMON_LONG_MIN_FUNDAMENTAL=50.0
      - COMMON_SHORT_MAX_FUNDAMENTAL=30.0
      - COMMON_LONG_LABEL_BLOCKLIST= insufficient_data, value_trap,overvalued,overvalued_weak,expensive_quality
      - COMMON_SHORT_LABEL_BLOCKLIST= insufficient_data, deep_value,quality_value,compounder,undervalued
      - COMMON_MIN_MARKET_CAP_USD_M=50000.0
      - COMMON_FILTER_FUNDAMENTAL_HIGH_LEVERAGE=false
      - COMMON_FILTER_NEGATIVE_EARNINGS_LONG=false
      - COMMON_FILTER_NEGATIVE_EARNINGS_SHORT=false

      # ---------------------------------------------------------------------
      # Zentrale Execution-/Risk-Policy
      #
      # Der Engine-Teil verwaltet Entry-Level, Stop-Loss, Take-Profit,
      # Trailing-Stop und maximale Haltedauer.
      #
      # TAKE_PROFIT_MODE:
      # fixed    = harter Take-Profit ab Entry.
      #            LONG:  entry * (1 + EXECUTION_LONG_TAKE_PROFIT_PCT / 100)
      #            SHORT: entry * (1 - EXECUTION_SHORT_TAKE_PROFIT_PCT / 100)
      #            Trailing-Parameter werden ignoriert.
      # trailing = kein fixer Take-Profit. Sobald die Aktivierung erreicht ist,
      #            wird der Stop zum Trailing-Stop mit der konfigurierten Distanz.
      #            Fixed-TP-Prozente werden ignoriert.
      #
      # Prozentwerte sind Prozentpunkte: 4.0 = 4%, 2.0 = 2%.
      # Stop-Loss, Take-Profit und Trailing werden nur innerhalb des jeweiligen
      # SL_TP_WINDOW ausgewertet.
      #
      # COMMON_STOP_* definiert den gemeinsamen Stop-Loss aus Lookback/ATR,
      # inklusive Mindest- und Maximalabstand.
      # ---------------------------------------------------------------------
      - TAKE_PROFIT_MODE=trailing
      - EXECUTION_LONG_TAKE_PROFIT_PCT=6.0
      - EXECUTION_SHORT_TAKE_PROFIT_PCT=6.0
      - EXECUTION_LONG_TRAILING_ACTIVATION_PCT=5.0
      - EXECUTION_SHORT_TRAILING_ACTIVATION_PCT=3.0
      - EXECUTION_LONG_TRAILING_DISTANCE_PCT=2.0
      - EXECUTION_SHORT_TRAILING_DISTANCE_PCT=1.5
      - EXECUTION_LONG_MAX_HOLD_DAYS=12.0
      - EXECUTION_SHORT_MAX_HOLD_DAYS=7.0
      - COMMON_STOP_LOSS_ENABLED=true 
      - COMMON_STOP_LOOKBACK_BARS=120
      - COMMON_STOP_BUFFER_RATIO=0.007
      - COMMON_STOP_ATR_LOOKBACK_BARS=120
      - COMMON_STOP_ATR_MULT=1.5
      - COMMON_MIN_STOP_PCT=3.0
      - COMMON_MAX_STOP_PCT=6.0

      # ---------------------------------------------------------------------
      # Pepperstone-Profil: EU Retail US Share CFD
      #
      # Wird genutzt, wenn ACCOUNT_PROFILE=ps_acc oder ACCOUNT_PROFILE=all.
      # PS_TRADABLE_SYMBOLS_TABLE liefert das handelbare Pepperstone-Universum.
      # Stop-Out und minimale Entry-Margin-Level bilden Broker-Risikoregeln ab.
      #
      # Explizit gesetzte PS_* Werte entsprechen Code-Defaults:
      # 20% Margin, 0.02 USD/Aktie Kommission, min. 0.02 USD,
      # kein extra Spread-Markup, 1 bps Slippage, Freitag Overnight x3.
      # *_PCT Werte sind Prozentpunkte: 20.0 = 20%, 5.0 = 5%.
      # ---------------------------------------------------------------------
      - PS_TRADABLE_SYMBOLS_TABLE=public.pepperstone_data
      - PS_MARGIN_STOP_OUT_LEVEL_PCT=50
      - PS_MIN_ENTRY_MARGIN_LEVEL_PCT=100
      - PS_MARGIN_REQUIREMENT_PCT=20
      - PS_ALLOW_FRACTIONAL_SHARES=false
      - PS_COMMISSION_PER_ORDER_USD=0.0
      - PS_COMMISSION_PER_SHARE_USD=0.02
      - PS_COMMISSION_MIN_PER_ORDER_USD=0.02
      - PS_COMMISSION_MAX_PCT=0.0
      - PS_COMMISSION_BPS=0.0
      - PS_SPREAD_BPS=0.0
      - PS_SLIPPAGE_BPS=1.0
      - PS_SHARE_CFD_ARR_PCT=5.0
      - PS_SHARE_CFD_ADMIN_FEE_PCT=2.5
      - PS_SHARE_CFD_SHORT_BORROW_RATE_PCT=0.0
      - PS_SHARE_CFD_OVERNIGHT_DAY_COUNT=360.0

      # ---------------------------------------------------------------------
      # Interactive-Brokers-Profil: Margin Account
      #
      # Wird genutzt, wenn ACCOUNT_PROFILE=ibkr_acc oder ACCOUNT_PROFILE=all.
      # Die Margin-Anforderungen kommen symbolgenau aus
      # IBKR_SYMBOL_MARGIN_REQUIREMENTS_TABLE.
      #
      # Explizit gesetzte IBKR_* Werte entsprechen Code-Defaults fuer Kommission,
      # Spread/Slippage, Fractional Shares und Margin-Finanzierung.
      # *_PCT Werte sind Prozentpunkte: 50.0 = 50%, 5.14 = 5.14%.
      # ---------------------------------------------------------------------
      - IBKR_SYMBOL_MARGIN_REQUIREMENTS_TABLE=public.ibkr_symbol_margin_requirements
      - IBKR_LONG_INITIAL_MARGIN_PCT=50.0
      - IBKR_LONG_MAINTENANCE_MARGIN_PCT=25.0
      - IBKR_SHORT_INITIAL_MARGIN_PCT=50.0
      - IBKR_SHORT_MAINTENANCE_MARGIN_PCT=50.0
      - IBKR_ALLOW_FRACTIONAL_SHARES=true
      - IBKR_COMMISSION_PER_ORDER_USD=0.0
      - IBKR_COMMISSION_PER_SHARE_USD=0.0035
      - IBKR_COMMISSION_MIN_PER_ORDER_USD=0.35
      - IBKR_COMMISSION_MAX_PCT=1.0
      - IBKR_COMMISSION_BPS=0.0
      - IBKR_SPREAD_BPS=0.0
      - IBKR_SLIPPAGE_BPS=1.0
      - IBKR_MARGIN_FINANCING_RATE_PCT=5.14

      # ---------------------------------------------------------------------
      # Trading-Sessions und SL/TP-Auswertungsfenster
      #
      # Alle Fenster sind im Format HH:MM-HH:MM und werden in der jeweiligen
      # *_WINDOW_TZ interpretiert.
      #
      # ENTRY_WINDOW begrenzt, wann neue Entries geoeffnet werden duerfen.
      # SL_TP_WINDOW begrenzt, wann Stop-Loss/Take-Profit/Trailing geprueft wird.
      # Jedes Brokerprofil hat eigene, geprefixte Fensterwerte.
      #
      # PS_24_ENTRY_SL_TP_ACTIVE schaltet optional Pepperstone-24h-Symbole frei,
      # wenn symbol_ps24 im Pepperstone-Universum gepflegt ist.
      # ---------------------------------------------------------------------
      - PS_24_ENTRY_SL_TP_ACTIVE=false
      - PS_ENTRY_WINDOW_ENABLED=true
      - PS_ENTRY_WINDOW_TZ=America/New_York
      - PS_ENTRY_WINDOW=11:00-16:00
      # Der Runner bewertet eine Modellentscheidung nach jedem wirklich geschlossenen 1h-Bar.
      - PS_SL_TP_WINDOW_TZ=America/New_York
      - PS_SL_TP_WINDOW=09:30-16:00
      - IBKR_ENTRY_WINDOW_ENABLED=true
      - IBKR_ENTRY_WINDOW_TZ=America/New_York
      - IBKR_ENTRY_WINDOW=11:00-17:00
      - IBKR_SL_TP_WINDOW_TZ=America/New_York
      - IBKR_SL_TP_WINDOW=09:30-17:00

      # ---------------------------------------------------------------------
      # Monte Carlo und Grid Search
      #
      # GRID_SEARCH_ENABLED=true testet Parametergitter aus den Modell-Konfigs.
      # MONTE_CARLO_ENABLED=true simuliert Ergebnisstreuung auf Basis der Trades.
      # MONTE_CARLO_SIMULATIONS ist die Anzahl der Zufallspfade.
      #
      # Beides kann Runs stark verlaengern. Fuer schnelle Modellvergleiche
      # bleiben beide Schalter normalerweise false.
      # ---------------------------------------------------------------------
      - GRID_SEARCH_ENABLED=false
      - MONTE_CARLO_ENABLED=false
      - MONTE_CARLO_SIMULATIONS=2000
    networks:
      - shared_net

networks:
  shared_net:
    external: true
    name: shared_net
