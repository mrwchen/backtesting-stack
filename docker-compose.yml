services:
  init-backtest-schema:
    image: postgres:17-alpine
    restart: "no"
    volumes:
      - ./init/schema.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres-ts-root-pw
      DROP_BACKTEST_TABLES_ON_START: "true"
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -v drop_backtest_tables_on_start="$${DROP_BACKTEST_TABLES_ON_START:-false}"
        -h timescaledb -p 5432 -U postgres-ts -d postgres -f /init.sql
    networks:
      - shared_net

  backtest-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      init-backtest-schema:
        condition: service_completed_successfully
    environment:
      # ── Generic: database / runtime ────────────────────────────────────────
      - PGHOST=timescaledb
      - PGPORT=5432
      - PGDATABASE=postgres
      - PGUSER=market-data-account
      - PGPASSWORD=market-data-account-pw
      - RESULT_SCHEMA=public
      - CONNECT_TIMEOUT_SECONDS=10
      - PGOPTIONS=-c search_path=public
      - DB_CONNECT_RETRIES=5
      - DB_CONNECT_RETRY_DELAY_S=5.0
      - LOG_LEVEL=INFO
      - RUN_LABEL_TZ=Europe/Berlin
      - PROGRESS_LOG_EVERY_DAYS=1
      - BAR_CACHE_WARMUP_DAYS=120
      - BAR_CACHE_BATCH_SIZE=100
      - DB_STATEMENT_TIMEOUT_MS=60000
      - DB_LOCK_TIMEOUT_MS=5000
      - DB_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS=60000
      - RUN_NOTES_EXTRA=v1

      # ── Generic: model selection ───────────────────────────────────────────
      # MODEL_SELECTION:
      #   single = run MODEL_FILE only
      #   multi  = run comma-separated MODEL_FILES
      #   all    = run every *.py model in ./backtest_models except helper files starting with "_"
      #- MODEL_SELECTION=single
      #- MODEL_SELECTION=multi
      - MODEL_SELECTION=all
      #- MODEL_FILE=statistical_regime_probability_v1.py
      #- MODEL_FILES=deep_pullback_quality_mean_reversion_v1.py,filing_aware_fundamental_momentum_v1.py,pullback_bounce_fundamental_v1.py,quality_breakout_fundamental_v1.py,regime_adaptive_swing_v1.py,sector_rotation_long_short_v1.py,weak_fundamental_breakdown_v1.py,statistical_regime_probability_v1.py
      - MODEL_PARALLELISM=1
      - MODEL_FAILURE_MODE=fail_fast

      # ── Generic: source tables ─────────────────────────────────────────────
      - SOURCE_1H=alpaca_market_data_1h
      - SOURCE_FUNDAMENTAL=stocks_analysis_fundamental_scores
      - SOURCE_WORLD_REGIME=world_regime_daily_scores_historical_mv
      - PEPPERSTONE_TABLE=public.pepperstone_data
      - IBKR_MARGIN_REQUIREMENTS_TABLE=public.ibkr_symbol_margin_requirements
      - REQUIRE_USD_FUNDAMENTALS=true
      - MIN_MARKET_CAP_M=2000.0
      # false = ignore negative_earnings_flag for that direction.
      - FILTER_NEGATIVE_EARNINGS_LONG=false
      - FILTER_NEGATIVE_EARNINGS_SHORT=false
      # Must stay false: candidate selection always requires point-in-time fundamental availability.
      - ALLOW_REBUILT_HISTORICAL_FUNDAMENTALS=false

      # ── Generic: time range ────────────────────────────────────────────────
      - START_DATE=2024-01-01
      - END_DATE=2026-05-06

      # ── Account 1/3: generic account selection / risk ──────────────────────
      # ACCOUNT_PROFILE selects which profile defaults the runner uses.
      #   ps_acc   = Pepperstone EU retail share CFD / PS24 approximation
      #   ibkr_acc = Interactive Brokers margin account approximation for US stocks
      - ACCOUNT_PROFILE=ibkr_acc
      - INITIAL_EQUITY=5000
      - RISK_PER_TRADE_PCT=2
      - MAX_OPEN_POSITIONS=10
      - SECTOR_DIVERSIFICATION_ENABLED=false
      - ENTRY_WINDOW_ENABLED=true
      - ENTRY_WINDOW_TZ=America/New_York
      - ENTRY_WINDOW_START=10:30
      - ENTRY_WINDOW_END=15:00
      - SL_TP_WINDOW_TZ=America/New_York
      - SL_TP_WINDOW_START=09:30
      - SL_TP_WINDOW_END=16:00
      - STOP_LOSS_RTH_ONLY=true
      - STOP_LOSS_RTH_TZ=America/New_York
      - STOP_LOSS_RTH_START=09:30
      - STOP_LOSS_RTH_END=16:00

      # ── Account 2/3: ps_acc / Pepperstone EU retail US Share CFD overrides ─
      # Defaults when ACCOUNT_PROFILE=ps_acc:
      #   Pepperstone EU retail shares leverage=5:1 => margin=20%, fractional=false
      #   commission=0.02 USD/share, min=0.02 USD, max cap disabled
      #   no extra Pepperstone spread markup, slippage=1 bps
      #   share CFD overnight funding at 17:00 New York on full active notional
      #   stop-out at margin level <=50%; new entries require margin level >=100%
      # Uncomment to override the ps_acc defaults.
      - PS_MARGIN_STOP_OUT_LEVEL_PCT=50
      - PS_MIN_ENTRY_MARGIN_LEVEL_PCT=100
      # - PS_MARGIN_REQUIREMENT_PCT=20
      # - PS_ALLOW_FRACTIONAL_SHARES=false
      # - PS_COMMISSION_PER_ORDER_USD=0.0
      # - PS_COMMISSION_PER_SHARE_USD=0.02
      # - PS_COMMISSION_MIN_PER_ORDER_USD=0.02
      # - PS_COMMISSION_MAX_PCT=0.0
      # - PS_COMMISSION_BPS=0.0
      # - PS_SPREAD_BPS=0.0
      # - PS_SLIPPAGE_BPS=1.0
      # - PS_SHARE_CFD_ARR_PCT=5.0
      # - PS_SHARE_CFD_ADMIN_FEE_PCT=2.5
      # - PS_SHARE_CFD_SHORT_BORROW_RATE_PCT=0.0
      # - PS_SHARE_CFD_OVERNIGHT_DAY_COUNT=360.0

      # ── Account 3/3: ibkr_acc / Interactive Brokers Pro Tiered overrides ───
      # Defaults when ACCOUNT_PROFILE=ibkr_acc:
      #   Available Funds = Equity with Loan Value - Initial Margin
      #   Excess Liquidity = Equity with Loan Value - Maintenance Margin
      #   Initial and maintenance margin percentages come from IBKR_MARGIN_REQUIREMENTS_TABLE.
      #   Pro Tiered first tier: commission=0.0035 USD/share, min=0.35 USD, max=1%
      #   spread=0 bps, slippage=1 bps, configured first-tier USD margin rate=5.14%
      # Uncomment to override the ibkr_acc defaults.
      # - IBKR_ALLOW_FRACTIONAL_SHARES=true
      # - IBKR_COMMISSION_PER_ORDER_USD=0.0
      # - IBKR_COMMISSION_PER_SHARE_USD=0.0035
      # - IBKR_COMMISSION_MIN_PER_ORDER_USD=0.35
      # - IBKR_COMMISSION_MAX_PCT=1.0
      # - IBKR_COMMISSION_BPS=0.0
      # - IBKR_SPREAD_BPS=0.0
      # - IBKR_SLIPPAGE_BPS=1.0
      # - IBKR_MARGIN_FINANCING_RATE_PCT=5.14

      # ── Generic: Monte Carlo ───────────────────────────────────────────────
      - MONTE_CARLO_ENABLED=false
      - N_MONTE_CARLO_SIMULATIONS=2000

      # ── Generic: grid search runner ────────────────────────────────────────
      - GRID_SEARCH_ENABLED=false

      # ── Shared model parameters ────────────────────────────────────────────
      # These parameters are read by all current strategy models. In multi/all
      # mode the same values are applied to every selected model unless a model
      # has its own default for an unset parameter.
      - LONG_MAX_SCORE=55.0
      - SHORT_MIN_SCORE=60.0
      - LONG_MIN_FUNDAMENTAL=62.0
      - SHORT_MAX_FUNDAMENTAL=42.0
      - LONG_LABEL_BLOCKLIST=value_trap,overvalued,overvalued_weak
      - SHORT_LABEL_BLOCKLIST=deep_value,quality_value,compounder
      - USE_MISPRICING_SCORE=true
      - MISPRICING_WEIGHT=0.3
      - MIN_BARS=150
      - PRICE_LOOKBACK_BARS=320
      - VOL_SHORT_BARS=5
      - VOL_LONG_BARS=25
      - LONG_MIN_PULLBACK=5.0
      - LONG_MAX_PULLBACK=25.0
      - LONG_IDEAL_PULLBACK=12.5
      - LONG_MAX_RSI=50.0
      - SHORT_MIN_BOUNCE=3.0
      - SHORT_MAX_BOUNCE=20.0
      - SHORT_IDEAL_BOUNCE=8.5
      - SHORT_MIN_RSI=35.0
      - SHORT_MAX_RSI=65.0
      - LONG_SL_BUFFER=0.008
      - SHORT_SL_BUFFER=0.008
      - LONG_TP1_PCT=0.05
      - LONG_TP2_PCT=0.10
      - SHORT_TP1_PCT=0.06
      - SHORT_TP2_PCT=0.08
      - SL_LOOKBACK_BARS=12
      - LONG_MAX_HOLD_DAYS=12.0
      - SHORT_MAX_HOLD_DAYS=5.0
      - TP1_CLOSE_RATIO=0.6

      # ── Statistical probability model parameters ──────────────────────────
      # Used by statistical_regime_probability_v1.py. It remains purely
      # statistical: same-symbol event study, Beta-smoothed probabilities,
      # realized volatility for stop distance, no RSI/EMA/TA inputs.
      - PROBABILITY_HISTORY_BARS=2200
      - PROBABILITY_MIN_BARS=650
      - PROBABILITY_SESSION_TZ=America/New_York
      - EVENT_LOOKBACK_DAYS=5
      - MIN_EVENT_DROP_PCT=2.0
      - MIN_CONSECUTIVE_DOWN_DAYS=2
      - MIN_DAILY_OBSERVATIONS=90
      - MIN_ANALOG_EVENTS=25
      - MAX_ANALOG_EVENTS=120
      - LONG_MIN_PROBABILITY=0.56
      - SHORT_MIN_PROBABILITY=0.56
      - MIN_EDGE_PCT_POINTS=2.0

      # ── Shared/simple model grid parameters ────────────────────────────────
      # The original pullback model uses these for TP/holding-period grid search.
      # The newer strategy files currently expose a single-config grid stub.
      - GRID_LONG_TP1_PCT=0.03
      - GRID_LONG_TP2_PCT=0.07
      - GRID_SHORT_TP1_PCT=0.05
      - GRID_SHORT_TP2_PCT=0.10
      - GRID_LONG_MAX_HOLD_DAYS=4,6
      - GRID_SHORT_MAX_HOLD_DAYS=2,3,4
      - GRID_TP1_CLOSE_RATIO=0.6,1
    networks:
      - shared_net

networks:
  shared_net:
    external: true
    name: shared_net
