services:
  init-backtest-schema:
    image: postgres:17-alpine
    restart: "no"
    volumes:
      - ./init/schema.sql:/init.sql:ro
    environment:
      PGPASSWORD: postgres-ts-root-pw
      DROP_ALL_BACKTEST_TABLES_ON_START: false
    command:
      - sh
      - -c
      - >
        psql -v ON_ERROR_STOP=1
        -v drop_backtest_tables_on_start="$${DROP_ALL_BACKTEST_TABLES_ON_START:-false}"
        -h timescaledb -p 5432 -U postgres-ts -d postgres -f /init.sql
    networks:
      - shared_net

  backtest-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: "no"
    depends_on:
      init-backtest-schema:
        condition: service_completed_successfully
    environment:
      # ---------------------------------------------------------------------
      # Database connection and result schema
      # ---------------------------------------------------------------------
      - PGHOST=timescaledb
      - PGPORT=5432
      - PGDATABASE=postgres
      - PGUSER=market-data-account
      - PGPASSWORD=market-data-account-pw
      - PGAPPNAME=backtest_runner
      - PGOPTIONS=-c search_path=public
      - RESULT_SCHEMA=public
      - DB_CONNECT_TIMEOUT_SECONDS=10
      - DB_CONNECT_RETRIES=5
      - DB_CONNECT_RETRY_DELAY_SECONDS=5.0
      - DB_STATEMENT_TIMEOUT_MS=60000
      - DB_LOCK_TIMEOUT_MS=5000
      - DB_IDLE_IN_TRANSACTION_SESSION_TIMEOUT_MS=60000

      # ---------------------------------------------------------------------
      # Run metadata and logging
      # ---------------------------------------------------------------------
      - LOG_LEVEL=INFO
      - RUN_LABEL_TZ=Europe/Berlin
      - RUN_NOTES_EXTRA=common_policy_split_v1

      # ---------------------------------------------------------------------
      # Source tables and point-in-time data safety
      # ---------------------------------------------------------------------
      - SOURCE_MARKET_DATA_1H_TABLE=alpaca_market_data_1h
      - SOURCE_FUNDAMENTAL_SCORES_TABLE=stock_scorer_fundamental_scores
      - SOURCE_WORLD_REGIME_TABLE=world_regime_daily_scores_mv
      - REQUIRE_USD_FUNDAMENTALS=true
      - ALLOW_REBUILT_HISTORICAL_FUNDAMENTALS=false

      # ---------------------------------------------------------------------
      # Backtest date range
      # ---------------------------------------------------------------------
      - START_DATE=2022-01-01
      - END_DATE=2026-05-01

      # ---------------------------------------------------------------------
      # Model selection and model configuration
      # single = run MODEL_FILE only
      # multi  = run comma-separated MODEL_FILES
      # all    = run every *.py model in ./backtest_models except helpers
      # Model-specific parameters live in ./backtest_model_configs/<model_stem>.env.
      # ---------------------------------------------------------------------
      - MODEL_SELECTION=all
      # - MODEL_SELECTION=single
      # - MODEL_FILE=statistical_direction_probability_v1.py
      # - MODEL_SELECTION=multi
      # - MODEL_FILES=adaptive_entry_swing_v1.py,deep_pullback_quality_mean_reversion_v1.py,failed_breakout_reversal_v1.py,filing_aware_fundamental_momentum_v1.py,pullback_bounce_fundamental_v1.py,quality_breakout_fundamental_v1.py,relative_strength_momentum_v1.py,sector_rotation_long_short_v1.py,statistical_direction_probability_v1.py,trend_pullback_reclaim_v1.py,volatility_contraction_breakout_v1.py,weak_fundamental_breakdown_v1.py
      - MODEL_CONFIG_DIR=/app/backtest_model_configs
      - MODEL_CONFIG_REQUIRED=true
      - MODEL_PARALLELISM=3
      - MODEL_FAILURE_MODE=continue

      # ---------------------------------------------------------------------
      # Runtime performance and caches
      # ---------------------------------------------------------------------
      - PROGRESS_LOG_EVERY_DAYS=25
      # all = full candidate diagnostics; signals = only accepted intents plus day summaries.
      - DECISION_EVENT_MODE=signals
      - DECISION_EVENT_FLUSH_BATCH_SIZE=25000
      - BAR_CACHE_WARMUP_DAYS=120
      - BAR_CACHE_BATCH_SIZE=200
      - BAR_CACHE_MAX_MIB=2048
      - SIGNAL_BAR_CACHE_ENABLED=true
      - SIGNAL_BAR_CACHE_MAX_MIB=2048
      - CANDIDATE_TIMELINE_CACHE_ENABLED=true
      - CANDIDATE_TIMELINE_CACHE_MAX_MIB=3072
      - CANDIDATE_TIMELINE_CURSOR_ITERSIZE=10000
      - CANDIDATE_TIMELINE_SHARED_CACHE_DIR=/tmp/backtest_candidate_timeline_cache

      # ---------------------------------------------------------------------
      # Account selection and portfolio risk
      # ---------------------------------------------------------------------
      # ACCOUNT_PROFILE selects the broker/account rules used by the backtest:
      # ps_acc   = Pepperstone EU retail US Share CFD profile
      # ibkr_acc = Interactive Brokers margin account profile
      # all      = run every selected model once with ps_acc and once with ibkr_acc
      - ACCOUNT_PROFILE=all
      - INITIAL_EQUITY_USD=5000
      - RISK_PER_TRADE_EQUITY_PCT=1.5
      - MAX_OPEN_POSITIONS=10
      - SECTOR_DIVERSIFICATION_ENABLED=false


      # ---------------------------------------------------------------------
      # Common policy: world-regime direction budget
      # This is model-independent portfolio policy, not entry logic.
      # ---------------------------------------------------------------------
      # strong_risk_on: score < 45
      - REGIME_STRONG_RISK_ON_MAX_SCORE=40.0
      - REGIME_STRONG_RISK_ON_LONG_RISK_MULTIPLIER=1.0
      - REGIME_STRONG_RISK_ON_SHORT_RISK_MULTIPLIER=0.0
      - REGIME_STRONG_RISK_ON_MAX_LONG_POSITIONS=10
      - REGIME_STRONG_RISK_ON_MAX_SHORT_POSITIONS=0

      # risk_on: 45 <= score < 55
      - REGIME_LONG_MAX_SCORE=55.0
      - REGIME_RISK_ON_LONG_RISK_MULTIPLIER=0.75
      - REGIME_RISK_ON_SHORT_RISK_MULTIPLIER=0.0
      - REGIME_RISK_ON_MAX_LONG_POSITIONS=10
      - REGIME_RISK_ON_MAX_SHORT_POSITIONS=0

      # neutral: 55 <= score < 60
      - REGIME_SHORT_MIN_SCORE=60.0
      - REGIME_NEUTRAL_LONG_RISK_MULTIPLIER=0.25
      - REGIME_NEUTRAL_SHORT_RISK_MULTIPLIER=0.35
      - REGIME_NEUTRAL_MAX_LONG_POSITIONS=7
      - REGIME_NEUTRAL_MAX_SHORT_POSITIONS=3

      # risk_off: 60 <= score < 70
      - REGIME_STRONG_RISK_OFF_MIN_SCORE=70.0
      - REGIME_RISK_OFF_LONG_RISK_MULTIPLIER=0.25
      - REGIME_RISK_OFF_SHORT_RISK_MULTIPLIER=0.75
      - REGIME_RISK_OFF_MAX_LONG_POSITIONS=3
      - REGIME_RISK_OFF_MAX_SHORT_POSITIONS=7

      # strong_risk_off: score >= 70
      - REGIME_STRONG_RISK_OFF_LONG_RISK_MULTIPLIER=0.0
      - REGIME_STRONG_RISK_OFF_SHORT_RISK_MULTIPLIER=1.0
      - REGIME_STRONG_RISK_OFF_MAX_LONG_POSITIONS=0
      - REGIME_STRONG_RISK_OFF_MAX_SHORT_POSITIONS=10

      # ---------------------------------------------------------------------
      # Common policy: fundamental eligibility
      # This pre-filter is model-independent. Models only emit symbol,
      # direction, score, and reason.
      # ---------------------------------------------------------------------
      - COMMON_LONG_MIN_FUNDAMENTAL=65.0
      - COMMON_SHORT_MAX_FUNDAMENTAL=30.0
      - COMMON_LONG_LABEL_BLOCKLIST= #value_trap,overvalued,overvalued_weak
      - COMMON_SHORT_LABEL_BLOCKLIST= #deep_value,quality_value,compounder
      - COMMON_MIN_MARKET_CAP_USD_M=10000.0
      - COMMON_FILTER_FUNDAMENTAL_HIGH_LEVERAGE=false
      - COMMON_FILTER_NEGATIVE_EARNINGS_LONG=false
      - COMMON_FILTER_NEGATIVE_EARNINGS_SHORT=false

      # ---------------------------------------------------------------------
      # Central execution/risk policy
      # The engine owns entry levels, stops, take profits, and hold duration.
      # TAKE_PROFIT_MODE allowed values:
      # fixed    = hard take-profit from entry price.
      #            LONG: entry * (1 + EXECUTION_LONG_TAKE_PROFIT_PCT)
      #            SHORT: entry * (1 - EXECUTION_SHORT_TAKE_PROFIT_PCT)
      #            The trailing activation/distance settings are ignored.
      # trailing = no fixed take-profit. Once price reaches the configured
      #            activation pct from entry, the stop becomes a trailing stop
      #            using the configured trailing distance pct.
      #            The fixed take-profit pct settings are ignored.
      # Percent values are decimals: 0.06 = 6%, 0.03 = 3%.
      # Stop-loss, take-profit and trailing checks use the SL_TP_WINDOW trading window.
      # ---------------------------------------------------------------------
      - TAKE_PROFIT_MODE=trailing
      - EXECUTION_LONG_TAKE_PROFIT_PCT=0.04
      - EXECUTION_SHORT_TAKE_PROFIT_PCT=0.04
      - EXECUTION_LONG_TRAILING_ACTIVATION_PCT=0.04
      - EXECUTION_SHORT_TRAILING_ACTIVATION_PCT=0.04
      - EXECUTION_LONG_TRAILING_DISTANCE_PCT=0.025
      - EXECUTION_SHORT_TRAILING_DISTANCE_PCT=0.025
      - EXECUTION_LONG_MAX_HOLD_DAYS=12.0
      - EXECUTION_SHORT_MAX_HOLD_DAYS=12.0
      - COMMON_STOP_LOSS_ENABLED=true 
      - COMMON_STOP_LOOKBACK_BARS=24
      - COMMON_STOP_BUFFER_RATIO=0.007
      - COMMON_STOP_ATR_LOOKBACK_BARS=24
      - COMMON_STOP_ATR_MULT=1.5
      - COMMON_MIN_STOP_PCT=3.0
      - COMMON_MAX_STOP_PCT=5.0

      # Pepperstone EU retail US Share CFD account profile
      # Defaults: 20% margin, 0.02 USD/share commission, min 0.02 USD,
      # no extra spread markup, 1 bps slippage, Friday overnight x3.
      # ---------------------------------------------------------------------
      - PS_TRADABLE_SYMBOLS_TABLE=public.pepperstone_data
      - PS_MARGIN_STOP_OUT_LEVEL_PCT=50
      - PS_MIN_ENTRY_MARGIN_LEVEL_PCT=100
      # - PS_MARGIN_REQUIREMENT_PCT=20
      # - PS_ALLOW_FRACTIONAL_SHARES=false
      # - PS_COMMISSION_PER_ORDER_USD=0.0
      # - PS_COMMISSION_PER_SHARE_USD=0.02
      # - PS_COMMISSION_MIN_PER_ORDER_USD=0.02
      # - PS_COMMISSION_MAX_PCT=0.0
      # - PS_COMMISSION_BPS=0.0
      # - PS_SPREAD_BPS=0.0
      # - PS_SLIPPAGE_BPS=1.0
      # - PS_SHARE_CFD_ARR_PCT=5.0
      # - PS_SHARE_CFD_ADMIN_FEE_PCT=2.5
      # - PS_SHARE_CFD_SHORT_BORROW_RATE_PCT=0.0
      # - PS_SHARE_CFD_OVERNIGHT_DAY_COUNT=360.0

      # ---------------------------------------------------------------------
      # Interactive Brokers margin account profile
      # Used only when ACCOUNT_PROFILE=ibkr_acc.
      # ---------------------------------------------------------------------
      - IBKR_SYMBOL_MARGIN_REQUIREMENTS_TABLE=public.ibkr_symbol_margin_requirements
      # - IBKR_ALLOW_FRACTIONAL_SHARES=true
      # - IBKR_COMMISSION_PER_ORDER_USD=0.0
      # - IBKR_COMMISSION_PER_SHARE_USD=0.0035
      # - IBKR_COMMISSION_MIN_PER_ORDER_USD=0.35
      # - IBKR_COMMISSION_MAX_PCT=1.0
      # - IBKR_COMMISSION_BPS=0.0
      # - IBKR_SPREAD_BPS=0.0
      # - IBKR_SLIPPAGE_BPS=1.0
      # - IBKR_MARGIN_FINANCING_RATE_PCT=5.14

      # ---------------------------------------------------------------------
      # Trading session and stop-loss/take-profit evaluation windows
      # Window values use HH:MM-HH:MM in the configured timezone.
      # Each account profile requires its own account-prefixed window values.
      # ---------------------------------------------------------------------
      - PS_24_ENTRY_SL_TP_ACTIVE=true
      - PS_ENTRY_WINDOW_ENABLED=true
      - PS_ENTRY_WINDOW_TZ=America/New_York
      - PS_ENTRY_WINDOW=09:30-16:00
      - PS_SL_TP_WINDOW_TZ=America/New_York
      - PS_SL_TP_WINDOW=09:30-16:00
      - IBKR_ENTRY_WINDOW_ENABLED=true
      - IBKR_ENTRY_WINDOW_TZ=America/New_York
      - IBKR_ENTRY_WINDOW=04:30-19:30
      - IBKR_SL_TP_WINDOW_TZ=America/New_York
      - IBKR_SL_TP_WINDOW=04:30-19:30

      # ---------------------------------------------------------------------
      # Monte Carlo and grid search
      # ---------------------------------------------------------------------
      - GRID_SEARCH_ENABLED=false
      - MONTE_CARLO_ENABLED=false
      - MONTE_CARLO_SIMULATIONS=2000
    networks:
      - shared_net

networks:
  shared_net:
    external: true
    name: shared_net
